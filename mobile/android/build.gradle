buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "25.1.8937393"
        kotlinVersion = "1.8.0"
        hermesEnabled = true
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.0.2")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
        classpath 'com.google.gms:google-services:4.4.0'
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
        // Repository cho @notifee/react-native - local libs
        maven {
            url("$rootDir/../node_modules/@notifee/react-native/android/libs")
        }
    }
    
    // Fix AAR metadata: ép androidx.core về 1.13.1 để tương thích với compileSdk 34 và AGP 8.0.2
    // Lý do: androidx.core:core-ktx:1.16.0 yêu cầu compileSdk >= 35 và AGP >= 8.6.0
    // Nhưng RN 0.73.0 template dùng AGP 8.0.2 và compileSdk 34, nên cần ép về version tương thích
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
        }
    }
}


